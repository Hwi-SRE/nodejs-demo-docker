name: Manual Angular Build & Deploy to JFrog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the build (e.g., v1.0.0, latest)'
        required: false
        default: 'latest'
        type: string
      environment:
        description: 'Deployment environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  JF_URL: ${{ vars.JF_URL }}
  JF_PROJECT: ${{ vars.JF_PROJECT }}
  JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
  NODE_VERSION: '18'
  JF_BUILD_NAME: "angular-app-build"
  JF_BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular Project
        run: npm run build

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Configure JFrog CLI
        run: |
          jf config add manual-jfrog \
            --url https://${{ env.JF_URL }} \
            --access-token ${{ env.JF_ACCESS_TOKEN }} \
            --interactive=false
          jf config use manual-jfrog

      # ✅ DÜZELTİLDİ: build-add-git doğru argüman formatıyla kullanıldı
      - name: Add Git Info to Build
        run: |
          jf rt build-add-git "${{ env.JF_BUILD_NAME }}" "${{ env.JF_BUILD_NUMBER }}" .

      - name: Upload Artifacts to JFrog Artifactory
        run: |
          VERSION_TAG="${{ github.event.inputs.version || github.sha }}"
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          
          ARTIFACT_PATH="dist/"
          TARGET_REPO="git-repo"  
          TARGET_PATH="${TARGET_REPO}/angular-builds/${ENV_NAME}/${VERSION_TAG}/"
          
          echo "📦 Yükleniyor: ${ARTIFACT_PATH} -> ${TARGET_PATH}"
          
          jf rt upload \
            --build-name "${{ env.JF_BUILD_NAME }}" \
            --build-number "${{ env.JF_BUILD_NUMBER }}" \
            --project "${{ env.JF_PROJECT }}" \
            --recursive \
            "${ARTIFACT_PATH}**" \
            "${TARGET_PATH}"
          
          echo "✅ Yükleme tamamlandı! https://${JF_URL}/artifactory/${TARGET_PATH}"

      - name: Publish Build Info to JFrog
        run: |
          jf rt build-publish \
            --build-name "${{ env.JF_BUILD_NAME }}" \
            --build-number "${{ env.JF_BUILD_NUMBER }}" \
            --project "${{ env.JF_PROJECT }}"
          
          echo "✅ Build info published! Build URL: https://${JF_URL}/ui/builds/${JF_BUILD_NAME}/${JF_BUILD_NUMBER}"

      - name: Show Completion Message
        run: echo "✅ Deployment successfully finished!-v2"
