name: Manual Angular Build & Deploy to JFrog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the build (e.g., v1.0.0, latest)'
        required: false
        default: 'latest'
        type: string
      environment:
        description: 'Deployment environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  JF_URL: ${{ vars.JF_URL }}
  JF_PROJECT: ${{ vars.JF_PROJECT }}
  JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
  NODE_VERSION: '18'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Basit Angular build (development varsayılan)
      - name: Build Angular Project
        run: npm run build

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Configure JFrog CLI
        run: |
          jf config add manual-jfrog \
            --url ${{ env.JF_URL }} \
            --access-token ${{ env.JF_ACCESS_TOKEN }} \
            --interactive=false
          jf config use manual-jfrog

      - name: Upload Artifacts to JFrog Artifactory
        run: |
          VERSION_TAG="${{ github.event.inputs.version || github.sha }}"
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          
          # Angular build çıktısı genelde dist/ altına gelir
          ARTIFACT_PATH="dist/"
          
          # HEDEF REPO ADINI KENDİ REPONUZA GÖRE DEĞİŞTİRİN!
          TARGET_REPO="generic-local"  
          TARGET_PATH="${TARGET_REPO}/angular-builds/${ENV_NAME}/${VERSION_TAG}/"
          
          echo "📦 Yükleniyor: ${ARTIFACT_PATH} -> ${TARGET_PATH}"
          
          jf rt upload \
            --project "${{ env.JF_PROJECT }}" \
            --recursive \
            "${ARTIFACT_PATH}**" \
            "${TARGET_PATH}"
          
          echo "✅ Yükleme tamamlandı! ${JF_URL}/artifactory/${TARGET_PATH}"

      - name: Show Completion Message
        run: echo "✅ Deployment successfully finished!-v2"
