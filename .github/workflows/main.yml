name: Manual Angular Build & Deploy to JFrog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the build (e.g., v1.0.0, latest)'
        required: false
        default: 'latest'
        type: string
      environment:
        description: 'Deployment environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

# GitHub Variables ve Secret'lar buradan okunuyor
env:
  JF_URL: ${{ vars.JF_URL }}
  JF_PROJECT: ${{ vars.JF_PROJECT }}
  JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
  NODE_VERSION: '18'   # Angular 15 için uygun

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Kaynak kodları çek
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Node.js kurulumu
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # 3. Bağımlılıkları yükle
      - name: Install Dependencies
        run: npm ci

      # 4. Angular 15 Projesini Build Al
      - name: Build Angular Project
        run: npm run build -- --prod
        # Eğer build script'iniz farklıysa (örnek: ng build), burayı düzeltin.

      # 5. JFrog CLI'yi kur
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      # 6. JFrog CLI'yi URL ve Token ile yapılandır
      - name: Configure JFrog CLI
        run: |
          jf config add manual-jfrog \
            --url ${{ env.JF_URL }} \
            --access-token ${{ env.JF_ACCESS_TOKEN }} \
            --interactive=false
          jf config use manual-jfrog

      # 7. Build çıktısını JFrog Artifactory'ye yükle
      - name: Upload Artifacts to JFrog Artifactory
        run: |
          # Manuel tetiklemeden girilen değerleri al, yoksa varsayılanları kullan
          VERSION_TAG="${{ github.event.inputs.version || github.sha }}"
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          
          # Angular build çıktı klasörü (Projene göre dist/proje-adi/ olabilir, kontrol et!)
          ARTIFACT_PATH="dist/"
          
          # HEDEF REPO ADINI KENDİ REPONA GÖRE DEĞİŞTİR!
          TARGET_REPO="generic-local"  # Örnek: npm-local, maven-local, vb.
          TARGET_PATH="${TARGET_REPO}/angular-builds/${ENV_NAME}/${VERSION_TAG}/"
          
          echo "📦 Yükleniyor: ${ARTIFACT_PATH} -> ${TARGET_PATH}"
          
          jf rt upload \
            --project "${{ env.JF_PROJECT }}" \
            --recursive \
            "${ARTIFACT_PATH}**" \
            "${TARGET_PATH}"
          
          echo "✅ Yükleme tamamlandı! Artifactory'de şurada: ${JF_URL}/artifactory/${TARGET_PATH}"

      # 8. (Sizin istediğiniz) Başarılı tamamlama mesajı
      - name: Show Completion Message
        run: echo "✅ Deployment successfully finished!-v2"
